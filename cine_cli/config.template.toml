# Confused?
# Check out the WIKI on configuration: https://github.com/cine-cli/cine-cli/wiki/Configuration

[cine-cli]
version = 1
debug = false
player = "mpv"
quality = "auto"
# parser = "lxml"
# editor = "nano"
skip_update_checker = false
auto_try_next_scraper = false
hide_ip = true

# [cine-cli.quality]
# resolution = 720

[cine-cli.ui]
# fzf = true
# limit = 20
preview = true
watch_options = true
display_quality = false

[cine-cli.plugins] # E.g: namespace = "package-name"
tmdb = "cine-cli"

[cine-cli.scrapers]
default = "tmdb"
test = "test.DEFAULT"

[cine-cli.http] # Don't mess with it if you don't know what you are doing!
timeout = 15
# headers = { User-Agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:109.0) Gecko/20100101 Firefox/117.0" }

# [cine-cli.downloads] # Do not use backslashes use forward slashes
# save_path = "~/Downloads"
# yt_dlp = true

# [cine-cli.subtitles] # See this page: https://en.wikipedia.org/wiki/List_of_ISO_639_language_codes
# language = "en"
