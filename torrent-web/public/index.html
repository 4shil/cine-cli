<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cine-cli Torrent Downloader</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface-hover: #222240;
      --border: #2a2a4a;
      --primary: #6c63ff;
      --primary-hover: #7b73ff;
      --text: #e0e0f0;
      --text-dim: #8888aa;
      --success: #4caf50;
      --warning: #ff9800;
      --error: #f44336;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    header .status {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    header .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--error);
    }

    header .status .dot.connected { background: var(--success); }

    /* Main */
    main {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
    }

    /* Add Torrent Form */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }

    .add-form label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: var(--primary); }
    .input-row input::placeholder { color: var(--text-dim); }

    .input-row button {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: var(--primary-hover); }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Torrent List */
    .torrent-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .torrent-list-header h2 {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .torrent-count {
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .torrent-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Torrent Card */
    .torrent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transition: border-color 0.2s;
    }

    .torrent-card:hover { border-color: var(--primary); }
    .torrent-card.done { border-color: var(--success); }
    .torrent-card.paused { border-color: var(--warning); }

    .torrent-card .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .torrent-card .name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      margin-right: 12px;
      word-break: break-all;
    }

    .torrent-card .badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge.downloading { background: rgba(108, 99, 255, 0.2); color: var(--primary); }
    .badge.seeding { background: rgba(76, 175, 80, 0.2); color: var(--success); }
    .badge.paused { background: rgba(255, 152, 0, 0.2); color: var(--warning); }
    .badge.error { background: rgba(244, 67, 54, 0.2); color: var(--error); }

    /* Progress Bar */
    .progress-container {
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .progress-bar .fill.done { background: var(--success); }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .actions button {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .actions button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .actions button.danger:hover {
      border-color: var(--error);
      color: var(--error);
    }

    /* Empty State */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty .icon { font-size: 48px; margin-bottom: 16px; }
    .empty p { font-size: 14px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-color: var(--error); }
    .toast.success { border-color: var(--success); }

    @media (max-width: 600px) {
      .input-row { flex-direction: column; }
      .stats { flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⬇</div>
  <h1>cine-cli Torrent Downloader</h1>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
</header>

<main>
  <div class="add-form">
    <label for="magnetInput">Magnet Link</label>
    <div class="input-row">
      <input type="text" id="magnetInput" placeholder="magnet:?xt=urn:btih:..." autocomplete="off" />
      <button id="addBtn" onclick="addTorrent()">Add Torrent</button>
    </div>
  </div>

  <div class="torrent-list-header">
    <h2>Downloads</h2>
    <span class="torrent-count" id="torrentCount">0 active</span>
  </div>

  <div class="torrent-list" id="torrentList">
    <div class="empty">
      <div class="icon">🧲</div>
      <p>Paste a magnet link above to start downloading</p>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  // ── Socket.io ──────────────────────────────────────────────────────────
  const socket = io();
  const torrents = new Map();

  socket.on('connect', () => {
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusText').textContent = 'Connected';
  });

  socket.on('disconnect', () => {
    document.getElementById('statusDot').classList.remove('connected');
    document.getElementById('statusText').textContent = 'Disconnected';
  });

  socket.on('torrent-list', (list) => {
    list.forEach(t => torrents.set(t.infoHash, t));
    render();
  });

  socket.on('torrent-update', (updates) => {
    updates.forEach(t => torrents.set(t.infoHash, t));
    render();
  });

  // ── Add Torrent ─────────────────────────────────────────────────────────
  async function addTorrent() {
    const input = document.getElementById('magnetInput');
    const btn = document.getElementById('addBtn');
    const magnet = input.value.trim();

    if (!magnet) {
      showToast('Please enter a magnet link', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      const res = await fetch('/api/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ magnet }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'Failed to add torrent');
      }

      input.value = '';
      showToast(`Added: ${data.name}`, 'success');
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Torrent';
    }
  }

  // Allow Enter key to submit
  document.getElementById('magnetInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTorrent();
  });

  // ── Actions ─────────────────────────────────────────────────────────────
  async function pauseTorrent(infoHash) {
    await fetch(`/api/pause/${infoHash}`, { method: 'POST' });
  }

  async function resumeTorrent(infoHash) {
    await fetch(`/api/resume/${infoHash}`, { method: 'POST' });
  }

  async function removeTorrent(infoHash) {
    await fetch(`/api/remove/${infoHash}`, { method: 'POST' });
    torrents.delete(infoHash);
    render();
  }

  // ── Render ──────────────────────────────────────────────────────────────
  function render() {
    const list = document.getElementById('torrentList');
    const count = document.getElementById('torrentCount');

    const items = Array.from(torrents.values());
    count.textContent = `${items.length} active`;

    if (items.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="icon">🧲</div>
          <p>Paste a magnet link above to start downloading</p>
        </div>`;
      return;
    }

    list.innerHTML = items.map(t => {
      const progress = Math.round(t.progress * 100);
      const sizeMB = (t.size / (1024 * 1024)).toFixed(1);
      const doneMB = (t.size * t.progress / (1024 * 1024)).toFixed(1);
      const dlSpeed = formatSpeed(t.downloadSpeed);
      const isDone = t.done || progress >= 100;
      const isPaused = t.paused && !isDone;

      let statusClass = 'downloading';
      let statusLabel = 'Downloading';
      if (isDone) { statusClass = 'seeding'; statusLabel = 'Complete'; }
      if (isPaused) { statusClass = 'paused'; statusLabel = 'Paused'; }

      return `
        <div class="torrent-card ${isDone ? 'done' : ''} ${isPaused ? 'paused' : ''}">
          <div class="top">
            <div class="name">${escapeHtml(t.name)}</div>
            <span class="badge ${statusClass}">${statusLabel}</span>
          </div>
          <div class="progress-container">
            <div class="progress-bar">
              <div class="fill ${isDone ? 'done' : ''}" style="width: ${progress}%"></div>
            </div>
            <div class="progress-text">
              <span>${progress}%</span>
              <span>${doneMB} / ${sizeMB} MB</span>
            </div>
          </div>
          <div class="stats">
            <span>⬇ ${dlSpeed}</span>
            <span>🌱 ${t.numPeers} peers</span>
            <span>📦 ${sizeMB} MB</span>
          </div>
          <div="actions">
            ${!isDone && !isPaused ? `<button onclick="pauseTorrent('${t.infoHash}')">⏸ Pause</button>` : ''}
            ${!isDone && isPaused ? `<button onclick="resumeTorrent('${t.infoHash}')">▶ Resume</button>` : ''}
            <button class="danger" onclick="removeTorrent('${t.infoHash}')">✕ Remove</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── Auto-add magnet from URL query param ────────────────────────────────
  const urlParams = new URLSearchParams(window.location.search);
  const autoMagnet = urlParams.get('magnet');
  if (autoMagnet) {
    document.getElementById('magnetInput').value = autoMagnet;
    addTorrent();
  }

  // ── Helpers ─────────────────────────────────────────────────────────────
  function formatSpeed(bytesPerSec) {
    if (!bytesPerSec || bytesPerSec === 0) return '0 B/s';
    const kb = bytesPerSec / 1024;
    if (kb >= 1024) return `${(kb / 1024).toFixed(1)} MB/s`;
    return `${kb.toFixed(0)} KB/s`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function showToast(msg, type = '') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `toast show ${type}`;
    setTimeout(() => toast.classList.remove('show'), 3000);
  }
</script>

</body>
</html>
