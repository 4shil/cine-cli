<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>cine :: torrent runtime</title>
<meta name="color-scheme" content="dark light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>

<!-- ───── [ SHELL ] ───────────────────────────────────────────────── -->
<div class="shell" id="shell">

  <!-- ───── [ LEFT RAIL ] ─────────────────────────────────────────── -->
  <aside class="rail" aria-label="runtime status">

    <header class="rail-head">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 4 L21 12 L3 20 L3 14 L15 12 L3 10 Z"/>
        </svg>
        <span class="brand-name">cine</span>
        <span class="brand-sub">torrent runtime</span>
      </div>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color mode" title="Toggle dark / light">
        <svg class="ico ico-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.5 4.5l2 2M17.5 17.5l2 2M4.5 19.5l2-2M17.5 6.5l2-2"/></svg>
        <svg class="ico ico-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 13a8 8 0 11-10-10 6 6 0 0010 10z"/></svg>
      </button>
    </header>

    <section class="rail-status" aria-label="connection">
      <div class="status-head">connection</div>
      <div class="status-pills" id="status-pills">
        <!-- injected: pills for socket, dht, trackers, peers, signaling … -->
      </div>
      <div class="wire" aria-hidden="true">
        <span class="wire-dot" id="wire-dot"></span>
        <div class="wire-line"></div>
        <span class="wire-amount" id="wire-amount">idle</span>
      </div>
    </section>

    <section class="rail-feed" aria-label="event feed">
      <div class="feed-head">event feed</div>
      <ol class="feed-list" id="feed-list" aria-live="polite">
        <!-- rolling terminal log -->
      </ol>
    </section>

    <footer class="rail-foot">
      <div class="foot-row"><span>uptime</span><span id="uptime">0s</span></div>
      <div class="foot-row"><span>downloads</span><span id="dl-path">~/.…</span></div>
      <div class="foot-row"><span>torrents</span><span id="totals">0 active · 0 bytes</span></div>
    </footer>
  </aside>

  <!-- ───── [ MAIN PANE ] ─────────────────────────────────────────── -->
  <main class="main" aria-label="torrents">

    <header class="main-head">
      <div class="head-title">
        <span class="t-num">01</span>
        <h1>queue</h1>
        <span class="t-meta" id="head-meta">0 active</span>
      </div>

      <form class="add-form" id="add-form" autocomplete="off">
        <span class="add-prompt" aria-hidden="true">></span>
        <input
          type="text"
          id="magnet"
          name="magnet"
          class="add-input"
          spellcheck="false"
          autocapitalize="off"
          autocomplete="off"
          autocorrect="off"
          placeholder="magnet:?xt=urn:btih:<40 hex digits>…"
        >
        <span class="add-hint" id="add-hint" aria-hidden="true">enter ↵</span>
        <button type="submit" class="add-submit" id="add-btn">enqueue</button>
      </form>
    </header>

    <section class="rows" id="rows" aria-label="torrents">
      <!-- populated by render() -->
    </section>

    <section class="empty" id="empty" hidden>
      <div class="empty-illu" aria-hidden="true">
        <svg viewBox="0 0 240 80" preserveAspectRatio="xMidYMid meet">
          <text x="0"   y="44" font-family="JetBrains Mono" font-size="12" font-weight="500">[ empty queue ]</text>
          <text x="0"   y="64" font-family="JetBrains Mono" font-size="12" font-weight="500" opacity=".45">$ paste a magnet link above and press enter</text>
        </svg>
      </div>
    </section>
  </main>
</div>

<!-- ───── [ INLINE OVERLAY: unimportant status, e.g. "added" ] ───── -->
<div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

<!-- ───── [ SOCKET.IO ] ──────────────────────────────────────────── -->
<script src="/socket.io/socket.io.js"></script>

<!-- ───── [ GSAP ] ────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<!-- ───── [ APP ] ────────────────────────────────────────────────── -->
<script src="/app.js"></script>

</body>
</html>
